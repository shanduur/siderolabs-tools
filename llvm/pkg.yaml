name: llvm
variant: scratch
dependencies:
  - stage: base
  - stage: patch
  - stage: cmake
  - stage: curl
  - stage: ninja
  - stage: python3
steps:
  - sources:
      - url: https://github.com/llvm/llvm-project/releases/download/llvmorg-{{ .llvm_version }}/llvm-project-{{ .llvm_version }}.src.tar.xz
        destination: llvm.tar.xz
        sha256: "{{ .llvm_sha256 }}"
        sha512: "{{ .llvm_sha512 }}"
    prepare:
      - |
        mkdir llvm
        tar -xJf llvm.tar.xz --strip-components=1

        patch -p1 < /pkg/patches/fix-memory-mf_exec-on-aarch64.patch
        patch -p1 < /pkg/patches/llvm-stack-size.patch
    build:
      - |
        # Stage 1: bootstrap clang/lld with the host GCC.
        # Minimal config — only the pieces needed to drive stage 2.
        cmake -S llvm -B build-stage1 -G Ninja \
              -DCMAKE_BUILD_TYPE=Release \
              -DLLVM_DEFAULT_TARGET_TRIPLE="${ARCH}-linux-musl" \
              -DLLVM_HOST_TRIPLE="${ARCH}-linux-musl" \
              -DLLVM_ENABLE_PROJECTS="clang;lld" \
              -DLLVM_TARGETS_TO_BUILD=Native \
              -DLLVM_INCLUDE_TESTS=OFF \
              -DLLVM_INCLUDE_DOCS=OFF \
              -DLLVM_INCLUDE_EXAMPLES=OFF \
              -DLLVM_INCLUDE_BENCHMARKS=OFF \
              -DLLVM_ENABLE_BINDINGS=OFF \
              -DLLVM_ENABLE_ASSERTIONS=OFF \
              -DLLVM_ENABLE_LTO=OFF
        cmake --build build-stage1
      - |
        # Stage 2: rebuild full LLVM using the stage 1 clang+lld, with ThinLTO.
        STAGE1=$(pwd)/build-stage1
        # Stage 1 clang doesn't auto-detect the toolchain image's GCC install
        # dir, so point it explicitly — dirname of libgcc.a is the install dir.
        GCC_INSTALL_DIR=$(dirname "$(gcc -print-libgcc-file-name)")
        export CFLAGS="${CFLAGS:-} --gcc-install-dir=${GCC_INSTALL_DIR}"
        export CXXFLAGS="${CXXFLAGS:-} --gcc-install-dir=${GCC_INSTALL_DIR}"
        cmake -S llvm -B build -G Ninja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_INSTALL_PREFIX=/usr \
              -DCMAKE_C_COMPILER="${STAGE1}/bin/clang" \
              -DCMAKE_CXX_COMPILER="${STAGE1}/bin/clang++" \
              -DLLVM_USE_LINKER=lld \
              -DLLVM_DEFAULT_TARGET_TRIPLE="${ARCH}-linux-musl" \
              -DLLVM_HOST_TRIPLE="${ARCH}-linux-musl" \
              -DLLVM_ENABLE_PROJECTS="clang;lld" \
              -DLLVM_BUILD_LLVM_DYLIB=ON \
              -DLLVM_LINK_LLVM_DYLIB=ON \
              -DLLVM_INCLUDE_TESTS=OFF \
              -DLLVM_INCLUDE_DOCS=OFF \
              -DLLVM_INCLUDE_EXAMPLES=OFF \
              -DLLVM_INCLUDE_BENCHMARKS=OFF \
              -DLLVM_ENABLE_BINDINGS=OFF \
              -DLLVM_INSTALL_UTILS=ON \
              -DLLVM_TARGETS_TO_BUILD="X86;AArch64" \
              -DLLVM_ENABLE_ASSERTIONS=OFF \
              -DLLVM_ENABLE_LTO=Thin
        cmake --build build
    install:
      - |
        DESTDIR=/rootfs cmake --install build
        # remove LLVM development files, but keep /usr/include: rustc's C++ LLVM
        # shim (rustc_llvm) needs the LLVM headers (llvm/Config/llvm-config.h, …)
        # to build against this LLVM.
        rm -rf /rootfs/usr/lib/cmake /rootfs/usr/lib/*.a
    test:
      - |
        # Validate usrmerge symlinks from toolchain did not get overwritten
        [ -L /bin ] && [ -d /bin ]
        [ -L /lib ] && [ -d /lib ]
        [ -L /lib64 ] && [ -d /lib64 ]
        [ -L /usr/lib64 ] && [ -d /usr/lib64 ]
        [ -L /sbin ] && [ -d /sbin ]
        [ -L /usr/sbin ] && [ -d /usr/sbin ]
finalize:
  - from: /rootfs
    to: /
