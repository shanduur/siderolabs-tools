name: fakeroot
variant: scratch
dependencies:
  - stage: base
  - stage: patch
  - stage: autoconf
  - stage: automake
  - stage: libtool
  - stage: tools-libcap
steps:
  - sources:
      - url: https://ftp.debian.org/debian/pool/main/f/fakeroot/fakeroot_{{ .fakeroot_version }}.orig.tar.gz
        destination: fakeroot.tar.gz
        sha256: "{{ .fakeroot_sha256 }}"
        sha512: "{{ .fakeroot_sha512 }}"
    prepare:
      - |
        tar -xzvf fakeroot.tar.gz --strip-components=1
      - |
        patch -p1 < /pkg/patches/fix-shell.patch
        patch -p1 < /pkg/patches/no-docs.patch
      - |
        autoreconf -vif
      - |
        ./configure \
            --prefix=/usr \
            CFLAGS="${CFLAGS} -fPIC"
    build:
      - |
        make -j $(nproc)
    install:
      - |
        make install DESTDIR=/rootfs PREFIX=/usr
finalize:
  - from: /rootfs
    to: /
